<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Chit-Chat</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/style.css">

    <!-- Font Awesome and Google Fonts -->
    <script src="https://kit.fontawesome.com/077c58acc8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,200" />

    <!-- Socket.IO from CDN (Avoid CORS issues) -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Client JS -->
    <script defer src="js/client.js"></script>
</head>

<body>
    <div class="container message-screen">
        <nav class="navbar">
            <a href="#"><i class="fa-solid fa-comments"></i> Chit-Chat</a>
        </nav>
    </div>

    <div class="text-box">
        <form action="" id="send-container">
            <input autocomplete="off" type="text" id="messageInput" placeholder="Type a message" required>
            
            <!-- 📁 File Upload Button -->
            <input type="file" id="fileInput" style="display: none;" />
            <label for="fileInput" class="upload-btn">
                <i class="fa-solid fa-paperclip"></i>
            </label>

            <button id="submit" type="submit">
                <span class="send-icon material-symbols-outlined">send</span>
            </button>
        </form>
    </div>

</html>
